# 必读！！！
# 此版本没有做防泄露处理，如介意请使用另一个名字为 configdns 的版本
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。

# ================================
# 1、机场订阅
# ================================
proxy-providers:
  Airport1:
    url: "你的机场订阅地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# ================================
# 2、节点信息
# ================================
proxies:
  - {name: 直连, type: direct}

# ================================
# 3、全局配置
# ================================
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true

# 如需裸核控制面板，可自行取消注释
# external-controller: 0.0.0.0:9090
# secret: ""
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# ================================
# 4、嗅探
# ================================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ================================
# 5、入站
# ================================
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# ================================
# 6、DNS 模块
# ================================
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# ================================
# 7、策略组：你的模板
# ================================
proxy-groups:
  - {name: 🧚 AI, type: select, proxies: [台湾-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动, 其他-手动, REJECT]}

  - {name: 🍀 Google, type: select, proxies: [所有-自动, 香港-自动, 日本-自动, 新加坡-自动, 美国-自动, 其他-手动]}

  - {name: 🙋 Telegram, type: select, proxies: [所有-自动, 香港-自动, 新加坡-自动]}

  - {name: 📘 GitHub, type: select, proxies: [直连, 所有-自动]}

  - {name: 🕹️ 游戏平台, type: select, proxies: [直连, 所有-自动, 香港-自动, 韩国-自动, 日本-自动]}

  - {name: 🕹️ Steam-商店, type: select, proxies: [直连, 所有-自动, 香港-自动, 日本-自动, 新加坡-自动, 美国-自动]}

  - {name: 📺 YouTube, type: select, proxies: [所有-自动, 香港-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动]}

  - {name: 📀 流媒体, type: select, proxies: [所有-自动, 香港-自动, 台湾-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动]}

  - {name: 🌍 国外, type: select, proxies: [所有-自动, 港台日新韩-自动, 香港-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动, 其他-手动]}

  - {name: 🎯 大陆, type: select, proxies: [直连]}

  - {name: 🐟 漏网之鱼, type: select, proxies: [直连, 🌍 国外, 其他-手动]}

# ================================
# 8、节点组：include-all 自动包含机场节点
# ================================
  - {name: 所有-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "^((?!(直连)).)*$"}

  - {name: 港台日新韩-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(广港|广台|广日|广新|广韩|广美|香港|HK|Hong Kong|🇭🇰|台湾|TW|🇹🇼|日本|JP|🇯🇵|新加坡|SG|🇸🇬|韩国|KR|🇰🇷)"}

  - {name: 台日新韩-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(台湾|TW|🇹🇼|日本|JP|🇯🇵|新加坡|SG|🇸🇬|韩国|KR|🇰🇷)"}

  - {name: 香港-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(香港|HK|Hong Kong|🇭🇰)"}

  - {name: 台湾-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(台湾|TW|🇹🇼)"}

  - {name: 日本-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(日本|JP|🇯🇵)"}

  - {name: 新加坡-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(新加坡|SG|🇸🇬)"}

  - {name: 韩国-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(韩国|KR|🇰🇷)"}

  - {name: 美国-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(美|US|🇺🇸)"}

  - {name: 其他-手动, type: select, include-all: true, filter: "^((?!(直连)).)*$"}

# ================================
# 9、规则匹配：Blackmatrix7 细分 + MetaCubeX 兜底
# ================================
rules:
  # 私有地址 / 局域网优先直连
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连

  # AI：最高优先级，强制代理
  - RULE-SET,openai,🧚 AI
  - RULE-SET,claude,🧚 AI
  - RULE-SET,gemini,🧚 AI
  - RULE-SET,copilot,🧚 AI

  # Google
  - RULE-SET,google,🍀 Google
  - RULE-SET,google_ip,🍀 Google

  # Telegram
  - RULE-SET,telegram,🙋 Telegram
  - RULE-SET,telegram_ip,🙋 Telegram

  # GitHub
  - RULE-SET,github,📘 GitHub

  # Steam 中国 CDN：强制直连
  - RULE-SET,steamcn,🎯 大陆

  # 游戏平台
  - RULE-SET,steam,🕹️ 游戏平台
  - RULE-SET,epic,🕹️ 游戏平台
  - RULE-SET,xbox,🕹️ 游戏平台

  # YouTube
  - RULE-SET,youtube,📺 YouTube

  # 流媒体兜底
  - RULE-SET,globalmedia,📀 流媒体

  # 非中国大陆域名兜底：比单纯 gfw 更全面
  - RULE-SET,geolocation-!cn,🌍 国外

  # 中国大陆直连
  - RULE-SET,cn_domain,🎯 大陆
  - RULE-SET,cn_ip,🎯 大陆

  # 最终兜底
  - MATCH,🐟 漏网之鱼

# ================================
# 10、规则锚点：MetaCubeX mrs 用
# ================================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

# ================================
# 11、规则集：混合推荐版
# ================================
rule-providers:
  # ===== MetaCubeX：Fake-IP 过滤 / 私有地址 / 国内外兜底 =====
  fakeipfilter_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"
    path: ./ruleset/fakeipfilter_domain.mrs

  private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    path: ./ruleset/private_domain.mrs

  private_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
    path: ./ruleset/private_ip.mrs

  geolocation-!cn:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"
    path: ./ruleset/geolocation-!cn.mrs

  cn_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    path: ./ruleset/cn_domain.mrs

  cn_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    path: ./ruleset/cn_ip.mrs

  google_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs"
    path: ./ruleset/google_ip.mrs

  telegram_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"
    path: ./ruleset/telegram_ip.mrs

  # ===== Blackmatrix7：服务细分规则 =====
  openai:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    path: ./ruleset/openai.yaml

  claude:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
    path: ./ruleset/claude.yaml

  gemini:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
    path: ./ruleset/gemini.yaml

  copilot:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml
    path: ./ruleset/copilot.yaml

  google:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
    path: ./ruleset/google.list

  telegram:
