# 必读！！！
# 此版本没有做防泄露处理，如介意请使用另一个名字为 configdns 的版本
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。

# ================================
# 1、机场订阅
# ================================
proxy-providers:
  Airport1:
    url: "订阅地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# ================================
# 2、节点信息
# ================================
proxies:
  - {name: 直连, type: direct}

# ================================
# 3、全局配置
# ================================
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，默认注释控制面板模块。
# external-controller: 0.0.0.0:9090
# secret: ""
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# ================================
# 4、嗅探
# ================================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ================================
# 5、入站
# ================================
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# ================================
# 6、DNS 模块
# ================================
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# ================================
# 7、出站策略组：改成你自己正在用的模板
# ================================
proxy-groups:
  - {name: 🧚 AI, type: select, proxies: [台湾-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动, 其他-手动, REJECT]}

  - {name: 🍀 Google, type: select, proxies: [所有-自动, 香港-自动, 日本-自动, 新加坡-自动, 美国-自动, 其他-手动]}

  - {name: 🙋 Telegram, type: select, proxies: [所有-自动, 香港-自动, 新加坡-自动]}

  - {name: 📘 GitHub, type: select, proxies: [直连, 所有-自动]}

  - {name: 🕹️ 游戏平台, type: select, proxies: [直连, 所有-自动, 香港-自动, 韩国-自动, 日本-自动]}

  - {name: 🕹️ Steam-商店, type: select, proxies: [直连, 所有-自动, 香港-自动, 日本-自动, 新加坡-自动, 美国-自动]}

  - {name: 📺 YouTube, type: select, proxies: [所有-自动, 香港-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动]}

  - {name: 📀 流媒体, type: select, proxies: [所有-自动, 香港-自动, 台湾-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动]}

  - {name: 🌍 国外, type: select, proxies: [所有-自动, 港台日新韩-自动, 香港-自动, 日本-自动, 新加坡-自动, 韩国-自动, 美国-自动, 其他-手动]}

  - {name: 🎯 大陆, type: select, proxies: [直连]}

  - {name: 🐟 漏网之鱼, type: select, proxies: [直连, 🌍 国外, 其他-手动]}

  # ================================
  # 8、节点组：使用他的 include-all 写法，名称改成你的
  # ================================
  - {name: 所有-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: ".*"}

  - {name: 港台日新韩-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(广港|广台|广日|广新|广韩|广美|香港|HK|Hong Kong|🇭🇰|台湾|TW|🇹🇼|日本|JP|🇯🇵|新加坡|SG|🇸🇬|韩国|KR|🇰🇷)"}

  - {name: 台日新韩-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(台湾|TW|🇹🇼|日本|JP|🇯🇵|新加坡|SG|🇸🇬|韩国|KR|🇰🇷)"}

  - {name: 香港-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(香港|HK|Hong Kong|🇭🇰)"}

  - {name: 台湾-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(台湾|TW|🇹🇼)"}

  - {name: 日本-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(日本|JP|🇯🇵)"}

  - {name: 新加坡-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(新加坡|SG|🇸🇬)"}

  - {name: 韩国-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(韩国|KR|🇰🇷)"}

  - {name: 美国-自动, type: url-test, include-all: true, tolerance: 150, interval: 60, url: https://www.gstatic.com/generate_204, filter: "(美|US|🇺🇸)"}

  - {name: 其他-手动, type: select, include-all: true}

# ================================
# 9、规则匹配：保留他的 rule-provider 名称，目标策略组改成你的
# ================================
rules:
  # 局域网 / 私有地址直连
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连

  # 机场自己的规则和轻量代理规则，统一走国外
  - DOMAIN-SUFFIX,qichiyu.com,🌍 国外
  - RULE-SET,proxylite,🌍 国外

  # AI：最高优先级
  - RULE-SET,ai,🧚 AI

  # GitHub
  - RULE-SET,github_domain,📘 GitHub

  # YouTube / Google
  - RULE-SET,youtube_domain,📺 YouTube
  - RULE-SET,google_domain,🍀 Google

  # 微软系：你的模板没有单独微软组，所以归到国外
  - RULE-SET,onedrive_domain,🌍 国外
  - RULE-SET,microsoft_domain,🌍 国外

  # Apple 直连
  - RULE-SET,apple_domain,直连

  # TikTok / Netflix 归到流媒体
  - RULE-SET,tiktok_domain,📀 流媒体
  - RULE-SET,netflix_domain,📀 流媒体

  # Telegram
  - RULE-SET,telegram_domain,🙋 Telegram

  # PayPal 归到国外
  - RULE-SET,paypal_domain,🌍 国外

  # IP 类规则
  - RULE-SET,apple_ip,直连
  - RULE-SET,google_ip,🍀 Google
  - RULE-SET,netflix_ip,📀 流媒体
  - RULE-SET,telegram_ip,🙋 Telegram

  # 非中国大陆域名走国外
  - RULE-SET,geolocation-!cn,🌍 国外

  # 中国大陆直连
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连

  # 最终兜底
  - MATCH,🐟 漏网之鱼

# ================================
# 10、规则集：保留他的 mrs 写法
# ================================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers:
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}

  private_domain: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}

